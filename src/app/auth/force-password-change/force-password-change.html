<div class="container-fluid d-flex justify-content-center align-items-center min-vh-100 forced-bg">
  <div class="card shadow-lg rounded-3 border-0 glass-morphism" style="max-width: 380px; width: 95%; padding: 1.25rem;">
    <div class="text-center mb-3">
      <div class="icon-circle bg-warning text-white mx-auto mb-2" style="width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 50%;">
        <i class="bi bi-shield-lock-fill" style="font-size: 1.1rem;"></i>
      </div>
      <h6 class="fw-bold mb-1">Security Update Required</h6>
      <p class="text-muted smaller mb-0">Please update your temporary password to continue.</p>
    </div>

    <form [formGroup]="passwordForm" (ngSubmit)="onSubmit()" novalidate>
      <!-- Current Password -->
      <div class="mb-2">
        <div class="input-group input-group-sm">
          <span class="input-group-text bg-light border-end-0"><i class="bi bi-key smaller"></i></span>
          <input [type]="showCurrentPassword ? 'text' : 'password'" id="currentPassword" formControlName="currentPassword"
            class="form-control border-start-0 ps-0" 
            [class.is-invalid]="passwordForm.get('currentPassword')?.invalid && passwordForm.get('currentPassword')?.touched"
            placeholder="Current temporary password">
          <button type="button" class="btn btn-outline-secondary py-0 border-start-0" (click)="showCurrentPassword = !showCurrentPassword">
            <i class="bi" [ngClass]="showCurrentPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
          </button>
        </div>
      </div>

      <!-- New Password -->
      <div class="mb-2">
        <div class="input-group input-group-sm">
          <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock smaller"></i></span>
          <input [type]="showPassword ? 'text' : 'password'" id="password" formControlName="password"
            class="form-control border-start-0 ps-0" 
            [class.is-invalid]="passwordForm.get('password')?.invalid && passwordForm.get('password')?.touched"
            placeholder="New secure password">
          <button type="button" class="btn btn-outline-secondary py-0 border-start-0" (click)="togglePasswordVisibility()">
            <i class="bi" [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
          </button>
        </div>
        
        <!-- Compact Strength Indicator -->
        <div *ngIf="passwordForm.get('password')?.value" class="mt-1 px-1">
          <div class="progress" style="height: 3px;">
            <div class="progress-bar bg-{{ getPasswordStrength().color }}"
              [style.width.%]="(getPasswordStrength().level / 4) * 100" role="progressbar">
            </div>
          </div>
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="mb-3">
        <div class="input-group input-group-sm">
          <span class="input-group-text bg-light border-end-0"><i class="bi bi-check2-circle smaller"></i></span>
          <input [type]="showConfirmPassword ? 'text' : 'password'" id="confirmPassword"
            formControlName="confirmPassword" class="form-control border-start-0 ps-0"
            [class.is-invalid]="passwordForm.get('confirmPassword')?.invalid && passwordForm.get('confirmPassword')?.touched"
            placeholder="Confirm new password">
          <button type="button" class="btn btn-outline-secondary py-0 border-start-0" (click)="toggleConfirmPasswordVisibility()">
            <i class="bi" [ngClass]="showConfirmPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
          </button>
        </div>
        <div class="text-danger smaller mt-1 px-1" *ngIf="passwordForm.get('confirmPassword')?.errors?.['passwordMismatch'] && passwordForm.get('confirmPassword')?.touched">
          Passwords do not match.
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-sm w-100 fw-bold mb-2 shadow-sm py-2" [disabled]="passwordForm.invalid || isSubmitting">
        <span *ngIf="!isSubmitting">Update & Continue</span>
        <span *ngIf="isSubmitting" class="spinner-border spinner-border-sm"></span>
      </button>

      <div class="text-center">
        <button type="button" class="btn btn-link btn-sm text-decoration-none text-muted smaller p-0" (click)="logout()">
          Logout & Exit
        </button>
      </div>
    </form>
  </div>
</div>
